apiVersion: v1
kind: ServiceAccount
metadata:
  name: warden
  namespace: warden
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: warden-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: warden-reader
subjects:
  - kind: ServiceAccount
    name: warden
    namespace: warden
roleRef:
  kind: ClusterRole
  name: warden-reader
  apiGroup: rbac.authorization.k8s.io
