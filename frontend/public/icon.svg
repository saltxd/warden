<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Outer hexagon glow -->
  <polygon
    points="256,60 418,152 418,360 256,452 94,360 94,152"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="4"
    filter="url(#glow)"
    opacity="0.5"
  />

  <!-- Main hexagon -->
  <polygon
    points="256,80 398,162 398,350 256,432 114,350 114,162"
    fill="none"
    stroke="url(#hexGrad)"
    stroke-width="6"
    filter="url(#glow)"
  />

  <!-- Inner hexagon -->
  <polygon
    points="256,130 348,187 348,325 256,382 164,325 164,187"
    fill="rgba(0,255,255,0.1)"
    stroke="url(#hexGrad)"
    stroke-width="2"
    opacity="0.6"
  />

  <!-- Lightning bolt -->
  <path
    d="M290,170 L230,270 L270,270 L222,370 L310,250 L260,250 L290,170"
    fill="url(#hexGrad)"
    filter="url(#glow)"
  />
</svg>
