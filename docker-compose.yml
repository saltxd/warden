version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    networks:
      - warden

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/home/admin
      - PATH=/usr/local/bin:/usr/bin:/bin:/home/admin/.local/bin
    volumes:
      # Mount Claude Code binary
      - /usr/bin/claude:/usr/bin/claude:ro
      # Mount Claude config files (needed for auth)
      - ~/.claude:/home/admin/.claude
      - ~/.claude.json:/home/admin/.claude.json
      # Mount SSH keys for node access
      - ~/.ssh:/home/admin/.ssh:ro
      # Mount kubeconfig for kubectl
      - ~/.kube:/home/admin/.kube:ro
    # Note: working_dir stays as /app (default) for Python code
    networks:
      - warden

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - warden

networks:
  warden:
    driver: bridge
