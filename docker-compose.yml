version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    networks:
      - warden

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - BUILD_SERVER_HOST=10.0.2.10
      - BUILD_SERVER_USER=admin
      - SSH_KEY_PATH=/root/.ssh/id_ed25519
    volumes:
      # Mount SSH keys from host (read-only)
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - ~/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    networks:
      - warden

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - warden

networks:
  warden:
    driver: bridge
